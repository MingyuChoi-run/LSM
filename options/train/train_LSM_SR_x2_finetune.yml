# general settings
name: train_LSM_SR_x2_finetune
model_type: LSMModel
scale: 2
num_gpu: auto
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: ./datasets/DF2K/HR
    dataroot_lq: ./datasets/DF2K/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

    gt_size: 184
    use_hflip: True
    use_rot: True

    # data loader
    use_shuffle: True
    num_worker_per_gpu: 8
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    task: SR
    name: Set5
    type: PairedImageDataset
    dataroot_gt: ./datasets/SR/Set5/HR
    dataroot_lq: ./datasets/SR/Set5/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

# network structures
network_g:
  type: LSM
  upscale: 2
  in_chans: 3
  img_size: 92
  d_state: 32
  img_range: 1.
  depth: [5,5,5,5,5,5,5,5]
  embed_dim: 180
  num_heads: [5,5,5,5,5,5,5,5]
  mlp_ratio: 2.0
  resi_connection: '1conv'
  split_size: [8,32]
  rmin: 0.9
  rmax: 0.99
  max_phase: 6.283
  num_tokens: 128

# path
path:
  pretrain_network_g: ./experiments/train_LSM_SR_x2_scratch/models/net_g_best.pth
  strict_load_g: true
  resume_state: ~
  
# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [120000, 160000, 180000, 190000]
    gamma: 0.5

  total_iter: 200000
  warmup_iter: 10000

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: False

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: True

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: True
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500